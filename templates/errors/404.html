<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: rgba(26, 26, 46, 0.8);
        }

        .error-content {
            text-align: center;
            color: var(--text);
        }

        .error-code {
            font-size: 5rem;
            color: var(--accent);
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            margin-bottom: 1rem;
        }

        .error-message {
            font-size: 1.5rem;
            color: var(--text-light);
            margin-bottom: 2rem;
        }

        .back-home {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: var(--accent);
            color: var(--primary);
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="error-section">
        <div class="error-content">
            <div class="error-code">404</div>
            <div class="error-message">Page Not Found</div>
            <p style="color: var(--text-light); margin-bottom: 2rem;">The page you're looking for doesn't exist.</p>
            <a href="{{ url_for('index') }}" class="back-home">← Back to Home</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="{{ url_for('static', filename='js/three-setup.js') }}"></script>
</body>
</html>
